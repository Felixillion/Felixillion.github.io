<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- jekyll-seo-tag (og:, twitter:, canonical etc.) -->
  {% seo %}

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">

  <!-- Global scripts -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- GoatCounter analytics — privacy-friendly, no cookies, no personal data collected.
       Full privacy policy at /privacy.html -->
  <script data-goatcounter="https://felixillion.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <!-- Hide nav brand on mobile — hamburger + page content provide all context -->
  <style>
    @media (max-width: 640px) { .nav-brand { display: none; } }
  </style>

  {% if page.head_scripts %}
  {{ page.head_scripts }}
  {% endif %}
</head>

<body>
  {% include nav.html %}

  <main {% if page.layout_style %}style="{{ page.layout_style }}"{% endif %}>
    {{ content }}
  </main>

  <!-- Global Footer -->
  <footer style="margin-top:4rem;padding:2rem;text-align:center;border-top:1px solid var(--glass-border);
                 color:var(--text-secondary);font-size:.8rem;">
    <p>Built by Felixillion.</p>
    <p style="margin-top:.5rem;">
      <a href="{{ '/privacy.html' | relative_url }}"
         style="color:var(--text-secondary);text-decoration:none;margin-right:1.2rem;">Privacy</a>
      Encountered a bug?
      <a href="https://github.com/Felixillion/Felixillion.github.io/issues" target="_blank"
         style="color:var(--dapi-blue);text-decoration:none;">Log an issue on GitHub</a>
    </p>
  </footer>

  {% if page.footer_scripts %}
  <!-- ?v= busts browser cache on each build. defer (not module) so download starts during HTML parse -->
  <script defer src="{{ page.footer_scripts | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M' }}"></script>
  {% endif %}
</body>

</html>
