name: Daily Data Update

on:
  schedule:
    # 7am AEST (UTC+10) = 9pm UTC previous day
    - cron: '0 21 * * *'
    # 7am AEDT (UTC+11, during daylight saving) = 8pm UTC previous day
    - cron: '0 20 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  # ── Job 1: ETF / stock data (Python + yfinance) ─────────────────────────
  update-etf-data:
    name: Update ETF & Stock Data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install yfinance

      - name: Run ETF data updater
        run: python scripts/update_etf_data.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update ETF/stock data $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Astrology data (Node.js) ─────────────────────────────────────
  update-astrology:
    name: Generate Astrology Data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Install Node dependencies
        run: |
          if [ -f package.json ]; then
            npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
          fi

      - name: Generate Astrology Data
        run: |
          SCRIPT=".github/workflows/scripts/generate_astrology_data.js"
          [ -f "$SCRIPT" ] && node "$SCRIPT" || echo "Script not found, skipping"
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update astrology data $(date -u +%Y-%m-%d)"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 3: Frequent flyer data (Node.js, Mondays only) ──────────────────
  update-frequent-flyer:
    name: Scrape Frequent Flyer Data
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Run only on Mondays; GitHub cron doesn't expose day-of-week
    # so we check inside the step instead
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          if [ -f package.json ]; then
            npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
          fi

      - name: Run Frequent Flyer scraper
        run: |
          SCRIPT=".github/workflows/scripts/ff_scraper.js"
          [ -f "$SCRIPT" ] && node "$SCRIPT" || echo "Script not found, skipping"
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update FF data $(date -u +%Y-%m-%d)"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
